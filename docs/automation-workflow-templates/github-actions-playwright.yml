# GitHub Actions — single-script Playwright + TCRT-proxied Allure callback
#
# Drop this at .github/workflows/playwright.yml as a starting point for the
# repo. TCRT injects tcrt_run_id and runner_label as workflow_dispatch inputs
# when triggering single-script runs; this template wires them into pytest and
# the inbound webhook callback.
#
# Architecture: GitHub Actions runners ship allure-results.tgz to TCRT's proxy
# endpoint. TCRT — co-located with Allure — does the project ensure / upload /
# generate-report handshake locally and writes the captured report_url back
# onto the run. The runner only needs ONE URL to know about (TCRT's webhook
# base) regardless of where Allure actually lives.
#
# Required repo / org secrets:
#   TCRT_BASE_URL       — TCRT public origin (must be reachable from GH runners)
#   TCRT_WEBHOOK_TOKEN  — webhook token from the TCRT inbound CI integration
#   TCRT_WEBHOOK_SECRET — HMAC shared secret (used for the status webhook;
#                         the allure-results upload uses token-only auth)

name: Playwright

on:
  workflow_dispatch:
    inputs:
      tcrt_run_id:
        description: TCRT correlation id (auto-injected)
        required: false
      runner_label:
        description: Which runner pool to use (auto-injected)
        required: false
        default: ubuntu-latest
      test_paths:
        description: JSON-encoded list of test paths
        required: false
        default: "[]"

jobs:
  test:
    runs-on: ${{ inputs.runner_label || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install allure-pytest pytest-playwright
          python -m playwright install --with-deps chromium

      - name: Run pytest
        id: pytest
        continue-on-error: true
        env:
          TCRT_RUN_ID: ${{ inputs.tcrt_run_id }}
        run: |
          PATHS=$(echo '${{ inputs.test_paths }}' | jq -r '. | join(" ")')
          if [ -z "$PATHS" ]; then PATHS="tests/"; fi
          pytest $PATHS --alluredir=allure-results

      - name: Ship allure-results to TCRT proxy
        if: always()
        id: allure
        env:
          TCRT_BASE_URL: ${{ secrets.TCRT_BASE_URL }}
          TCRT_WEBHOOK_TOKEN: ${{ secrets.TCRT_WEBHOOK_TOKEN }}
          TCRT_RUN_ID: ${{ inputs.tcrt_run_id }}
        run: |
          REPORT_URL=""
          if [ -d allure-results ] && [ -n "$TCRT_BASE_URL" ] && [ -n "$TCRT_WEBHOOK_TOKEN" ]; then
            tar czf allure-results.tgz allure-results
            RESP=$(curl -sS -X POST \
              "$TCRT_BASE_URL/api/v1/webhooks/ci/$TCRT_WEBHOOK_TOKEN/allure-results" \
              -F "tcrt_run_id=${TCRT_RUN_ID}" \
              -F "results=@allure-results.tgz" \
              || echo "")
            if [ -n "$RESP" ]; then
              REPORT_URL=$(echo "$RESP" | jq -r '.report_url // empty')
            fi
          fi
          echo "report_url=$REPORT_URL" >> "$GITHUB_OUTPUT"

      - name: Notify TCRT
        if: always()
        env:
          TCRT_BASE_URL: ${{ secrets.TCRT_BASE_URL }}
          TCRT_WEBHOOK_TOKEN: ${{ secrets.TCRT_WEBHOOK_TOKEN }}
          TCRT_WEBHOOK_SECRET: ${{ secrets.TCRT_WEBHOOK_SECRET }}
        run: |
          STATUS=$([[ "${{ steps.pytest.outcome }}" == "success" ]] && echo "SUCCEEDED" || echo "FAILED")
          PAYLOAD=$(jq -nc \
            --arg id "${{ inputs.tcrt_run_id }}" \
            --arg status "$STATUS" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg report "${{ steps.allure.outputs.report_url }}" \
            '{tcrt_run_id:$id, status:$status, external_run_url:$url}
             + (if $report == "" then {} else {report_url:$report} end)')
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$TCRT_WEBHOOK_SECRET" | awk '{print $2}')
          curl -fsS -X POST \
            "$TCRT_BASE_URL/api/v1/webhooks/ci/$TCRT_WEBHOOK_TOKEN/run-status" \
            -H "Content-Type: application/json" \
            -H "X-TCRT-Signature: sha256=$SIG" \
            -H "X-TCRT-Delivery: ${{ github.run_id }}" \
            -d "$PAYLOAD"
