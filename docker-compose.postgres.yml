services:
  postgres:
    image: postgres:16
    container_name: tcrt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tcrt
      POSTGRES_PASSWORD: tcrt
      POSTGRES_DB: tcrt_main
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U tcrt -d tcrt_main"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d

volumes:
  postgres-data:
